<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Trading Panel</title>
</head>
<body style="background: #121212; margin: 0;" onclick="openTrading()">
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; text-align: center; color: #00ff88;">
        <h2 style="font-family: sans-serif; border: 2px solid #00ff88; padding: 20px; border-radius: 10px;">Запустити Крипто-Панель (10 вкладок)</h2>
        <p style="font-family: sans-serif; color: #888;">Клацніть у будь-якому місці екрана</p>
    </div>

    <script>
        const tradeUrls = [
            'https://betfury.ai/boxes/all',
            'https://www.kryptex.com/site/dashboard',
            'https://remotedesktop.google.com/access/session/712f9bec-4d8c-57c2-5b1b-9357b269498e?hl=ru&pli=1',
            'https://coinmarketcap.com/account/my-diamonds/',
            'https://www.binance.com/ru-UA/futures/TRXUSDT',
            'https://www.binance.com/ru-UA/trade/TRX_USDT?type=spot',
            'https://docs.google.com/spreadsheets/d/1Ox9Pnm_atov3hzQrwyTc1wjq2PsyTV-j1w2kABrbrHQ/edit?gid=0#gid=0',
            'https://ru.tradingview.com/chart/v8Tu8WVy/?symbol=BINANCE%3ABTCUSD.P',
            'https://limercoin.com/space',
            'https://app.hyperliquid.xyz/trade/TRX'
        ];

        function openTrading() {
            tradeUrls.forEach((url, index) => {
                setTimeout(() => {
                    window.open(url, '_blank');
                }, index * 350); // Чуть увеличил задержку для тяжелых сайтов (Binance/TV)
            });

            setTimeout(() => {
                document.querySelector('h2').innerText = "Вкладки запущені!";
                document.querySelector('h2').style.borderColor = "#555";
                document.querySelector('h2').style.color = "#555";
            }, tradeUrls.length * 350 + 500);
        }

        window.onload = openTrading;
    </script>
</body>
</html>
