<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Запуск панелі...</title>
</head>
<body style="background: #ffffff; margin: 0;" onclick="openAll()">
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; text-align: center;">
        <h2 style="font-family: sans-serif; color: #333;">Натисніть тут для запуску (10 вкладок)</h2>
        <p style="font-family: sans-serif; color: #888;">Якщо не відкрилися — перевірте дозвіл на "Pop-ups" у рядку адреси</p>
    </div>

    <script>
        const urls = [
            'https://betfury.ai/boxes/all',
            'https://www.kryptex.com/site/dashboard',
            'https://remotedesktop.google.com/access/session/712f9bec-4d8c-57c2-5b1b-9357b269498e?hl=ru&pli=1',
            'https://coinmarketcap.com/account/my-diamonds/',
            'https://www.binance.com/ru-UA/futures/TRXUSDT',
            'https://www.binance.com/ru-UA/trade/TRX_USDT?type=spot',
            'https://docs.google.com/spreadsheets/d/1Ox9Pnm_atov3hzQrwyTc1wjq2PsyTV-j1w2kABrbrHQ/edit?gid=0#gid=0',
            'https://ru.tradingview.com/chart/v8Tu8WVy/?symbol=BINANCE%3ABTCUSD.P',
            'https://limercoin.com/space',
            'https://app.hyperliquid.xyz/trade/TRX'
        ];

        function openAll() {
            urls.forEach((url, index) => {
                setTimeout(() => {
                    window.open(url, '_blank');
                }, index * 300);
            });

            setTimeout(() => {
                document.querySelector('h2').innerText = "Готово! Цю вкладку можна закрити.";
            }, urls.length * 300 + 1000);
        }

        window.onload = openAll;
    </script>
</body>
</html>
