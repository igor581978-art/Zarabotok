<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body onclick="run()">
    <script>
        const urls = [
            'https://betfury.ai/boxes/all',
            'https://www.kryptex.com/site/dashboard',
            'https://remotedesktop.google.com/access/session/712f9bec-4d8c-57c2-5b1b-9357b269498e?hl=ru&pli=1',
            'https://coinmarketcap.com/account/my-diamonds/',
            'https://www.binance.com/ru-UA/futures/TRXUSDT',
            'https://www.binance.com/ru-UA/trade/TRX_USDT?type=spot',
            'https://docs.google.com/spreadsheets/d/1Ox9Pnm_atov3hzQrwyTc1wjq2PsyTV-j1w2kABrbrHQ/edit?gid=0#gid=0',
            'https://ru.tradingview.com/chart/v8Tu8WVy/?symbol=BINANCE%3ABTCUSD.P',
            'https://limercoin.com/space',
            'https://app.hyperliquid.xyz/trade/TRX'
        ];

        function run() {
            urls.forEach((url, i) => {
                setTimeout(() => { window.open(url, '_blank'); }, i * 250);
            });
            // Пытаемся закрыться. Если не даст — страница останется пустой и белой.
            setTimeout(() => { window.close(); }, urls.length * 250 + 500);
        }

        // Запуск при загрузке
        window.onload = run;
    </script>
</body>
</html>
